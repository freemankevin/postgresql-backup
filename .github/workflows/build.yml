name: Docker Build and Publish

on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL Major Version'
        required: true
        default: '18'
        type: choice
        options:
          - '18'
          - '17'
          - '16'
          - '15'
          - '14'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DEFAULT_PG_VERSION: '18'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v3

    - name: Set PostgreSQL version
      id: set_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "pg_version=${{ github.event.inputs.pg_version }}" >> $GITHUB_OUTPUT
        else
          echo "pg_version=${{ env.DEFAULT_PG_VERSION }}" >> $GITHUB_OUTPUT
        fi

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        build-args: |
          PG_MAJOR_VERSION=${{ steps.set_version.outputs.pg_version }}
        tags: ghcr.io/${{ github.repository_owner }}/postgresql-backup:latest
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/postgresql-backup:latest
        cache-to: type=inline