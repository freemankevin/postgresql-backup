services:
  postgres:
    image: "ghcr.io/freemankevin/postgresql-postgis:18.3"
    container_name: postgres
    environment:
      - TZ=Asia/Shanghai
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Postgres@123.com
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - postgres_network

  pg-backup:
    image: ghcr.io/freemankevin/postgresql-backup:latest
    container_name: pg-backup
    environment:
      TZ: Asia/Shanghai
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: Postgres@123.com
      PG_DATABASE: postgres
      BACKUP_RETENTION_DAYS: 7
      BACKUP_TIME: "03:00"
      BACKUP_INTERVAL: daily
      ENABLE_COMPRESSION: "true"
      BACKUP_FORMAT: "both"
      BACKUP_DIR: /backups
    volumes:
      - ./data/backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - postgres_network

networks:
  postgres_network:
    driver: bridge